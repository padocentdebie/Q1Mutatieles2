<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Q1Mutatie Les 2 - Zinsdelen</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #003082;
            --secondary: #f0f2f5;
            --accent: #d32f2f;
            --text: #333;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--secondary); 
            margin: 0; 
            overflow: hidden; 
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navigatie */
        #main-nav {
            background: var(--primary);
            padding: 10px;
            display: none;
            justify-content: center;
            gap: 10px;
            z-index: 2000;
        }

        .nav-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .nav-btn.active { background: white; color: var(--primary); }

        /* Schermen */
        .screen {
            flex-grow: 1;
            display: none;
            width: 100%;
            height: calc(100vh - 60px);
            position: relative;
        }

        .screen.active { display: flex; flex-direction: column; }

        /* Dragables Container & Labels */
        .drag-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1000;
        }

        .draggable-label {
            position: absolute;
            background: white;
            border: 2px solid var(--primary);
            padding: 8px 12px;
            border-radius: 6px;
            cursor: move;
            font-weight: bold;
            pointer-events: auto;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            user-select: none;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        .delete-icon {
            color: var(--accent);
            cursor: pointer;
            font-size: 1.1em;
        }

        .delete-icon:hover { opacity: 0.7; }

        .control-panel {
            background: #fff;
            padding: 10px;
            display: flex;
            justify-content: center;
            gap: 10px;
            border-top: 1px solid #ddd;
            z-index: 1100;
        }

        /* Login */
        #screen-login {
            display: flex; justify-content: center; align-items: center;
            background: linear-gradient(135deg, #003082 0%, #0056b3 100%);
            height: 100vh;
        }
        .login-box { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); text-align: center; width: 350px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }

        /* Content */
        .content-container { padding: 40px; max-width: 800px; margin: auto; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow-y: auto; }
        .grammar-rule { margin-bottom: 20px; padding-left: 20px; border-left: 4px solid var(--primary); }

        iframe, embed { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <nav id="main-nav">
        <button class="nav-btn active" onclick="showScreen(2)">1. Uitleg</button>
        <button class="nav-btn" onclick="showScreen(3)">2. Digibord</button>
        <button class="nav-btn" onclick="showScreen(4)">3. Oefening</button>
        <button class="nav-btn" onclick="showScreen(5)">4. PDF Bron</button>
    </nav>

    <!-- Scherm 1: Login -->
    <div id="screen-1" class="screen active" style="height: 100vh;">
        <div id="screen-login">
            <div class="login-box">
                <h2>Q1Mutatie Les 2</h2>
                <input type="text" id="studentName" placeholder="Je voornaam...">
                <select id="classSelect">
                    <option value="" disabled selected>Kies je klas...</option>
                    <option value="Alpha">Alpha</option>
                    <option value="Bravo">Bravo</option>
                    <option value="Charlie">Charlie</option>
                    <option value="Delta">Delta</option>
                    <option value="Echo">Echo</option>
                    <option value="Foxtrot">Foxtrot</option>
                    <option value="Golf">Golf</option>
                    <option value="Hotel">Hotel</option>
                    <option value="Juliet">Juliet</option>
                    <option value="Kilo">Kilo</option>
                    <option value="Lima">Lima</option>
                    <option value="Mike">Mike</option>
                </select>
                <button onclick="login()" style="background:var(--primary); color:white; border:none; padding:15px; width:100%; border-radius:8px; font-weight:bold; cursor:pointer; margin-top:10px;">Start de les</button>
            </div>
        </div>
    </div>

    <!-- Scherm 2: Uitleg -->
    <div id="screen-2" class="screen">
        <div class="content-container">
            <h1>Q1 Taalperfect Zinsdelen</h1>
            <div class="grammar-rule">
                <h3>1. Persoonsvorm (pv)</h3>
                <p>Zet de zin in een andere tijd. Gebruik je de <strong>ovt</strong>? Dan krijgt de zin een <strong>filmisch</strong> karakter.</p>
            </div>
            <div class="grammar-rule">
                <h3>2. Gezegde (gez)</h3>
                <p>Alle werkwoorden in de zin.</p>
            </div>
            <div class="grammar-rule">
                <h3>3. Onderwerp (ow)</h3>
                <p>Vraag: Wie/wat + pv?</p>
            </div>
        </div>
    </div>

    <!-- Scherm 3: Digibord -->
    <div id="screen-3" class="screen">
        <canvas id="whiteboard" width="1200" height="800" style="background:white;"></canvas>
        <div class="control-panel">
            <input type="text" id="wordInput" style="width:200px;" placeholder="Woord...">
            <button id="addBtn" style="background:var(--primary); color:white; padding:10px; border-radius:5px;">Toevoegen</button>
            <button id="clearBtn" style="background:var(--accent); color:white; padding:10px; border-radius:5px;">Wis Bord</button>
        </div>
    </div>

    <!-- Scherm 4: Oefening -->
    <div id="screen-4" class="screen">
        <iframe src="https://learningapps.org/watch?v=p696ntbi323"></iframe>
        <div id="label-layer-4" class="drag-layer"></div>
        <div class="control-panel">
            <button onclick="spawnLabels(4)" style="background:var(--primary); color:white; padding:10px; border-radius:5px;">Nieuwe set labels</button>
        </div>
    </div>

    <!-- Scherm 5: PDF -->
    <div id="screen-5" class="screen">
        <embed src="lesmateriaal.pdf" type="application/pdf">
        <div id="label-layer-5" class="drag-layer"></div>
        <div class="control-panel">
            <button onclick="spawnLabels(5)" style="background:var(--primary); color:white; padding:10px; border-radius:5px;">Nieuwe zinsdelen</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA3_rzoZOWytlyAbYKKe_WuFlD8z2WvbX4",
            authDomain: "aangifteq2les1.firebaseapp.com",
            databaseURL: "https://aangifteq2les1-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "aangifteq2les1",
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let currentDrag = null;
        window.currentClass = "";

        // LOGIN FUNCTIE
        window.login = () => {
            const name = document.getElementById('studentName').value;
            const klas = document.getElementById('classSelect').value;
            
            if(!name || !klas) {
                alert("Vul je naam in en kies een klas!");
                return;
            }
            
            window.currentClass = klas;
            document.getElementById('main-nav').style.display = 'flex';
            window.showScreen(2);
            setupSync();
        };

        // NAVIGATIE
        window.showScreen = (n) => {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(`screen-${n}`).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach((btn, idx) => {
                btn.classList.toggle('active', (idx + 2) === n);
            });
        };

        // SYNC SETUP
        function setupSync() {
            [4, 5].forEach(screenId => {
                onValue(ref(db, `classes/${window.currentClass}/labels/s${screenId}`), (snap) => {
                    const container = document.getElementById(`label-layer-${screenId}`);
                    container.innerHTML = '';
                    const data = snap.val();
                    if(data) {
                        Object.entries(data).forEach(([id, obj]) => {
                            createHTMLLabel(screenId, id, obj);
                        });
                    }
                });
            });
        }

        function createHTMLLabel(screenId, id, obj) {
            const container = document.getElementById(`label-layer-${screenId}`);
            const el = document.createElement('div');
            el.className = 'draggable-label';
            el.style.left = obj.x + 'px';
            el.style.top = obj.y + 'px';
            el.innerHTML = `<span>${obj.text}</span>`;
            
            if(screenId === 5) {
                const del = document.createElement('i');
                del.className = 'fa-solid fa-circle-xmark delete-icon';
                del.onclick = (e) => {
                    e.stopPropagation();
                    remove(ref(db, `classes/${window.currentClass}/labels/s${screenId}/${id}`));
                };
                el.appendChild(del);
            }

            const handleMove = (e) => {
                if(currentDrag !== id) return;
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                update(ref(db, `classes/${window.currentClass}/labels/s${screenId}/${id}`), {
                    x: clientX - 40,
                    y: clientY - 80
                });
            };

            const stopMove = () => {
                currentDrag = null;
                window.removeEventListener('mousemove', handleMove);
                window.removeEventListener('touchmove', handleMove);
            };

            const startMove = (e) => {
                currentDrag = id;
                window.addEventListener('mousemove', handleMove);
                window.addEventListener('touchmove', handleMove);
                window.addEventListener('mouseup', stopMove, {once:true});
                window.addEventListener('touchend', stopMove, {once:true});
            };

            el.onmousedown = startMove;
            el.ontouchstart = startMove;
            container.appendChild(el);
        }

        window.spawnLabels = (screenId) => {
            if(!window.currentClass) return;
            const sets = {
                4: ["Aanleiding", "Situatie", "Toedracht", "Maatregelen", "Afhandeling"],
                5: ["Persoonsvorm", "Onderwerp", "Gezegde", "Lijdend voorwerp", "Meewerkend voorwerp", "Bijwoordelijke bepaling"]
            };
            sets[screenId].forEach((txt, i) => {
                push(ref(db, `classes/${window.currentClass}/labels/s${screenId}`), {
                    text: txt, x: 100, y: 100 + (i * 50)
                });
            });
        };
    </script>
</body>
</html>
